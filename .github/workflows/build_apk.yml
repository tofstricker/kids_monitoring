name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # Opt-in to Node.js 24 to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Java
        uses: actions/setup-java@v4 # Updated to V4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          
      - name: Get Dependencies
        run: |
          # If paths differ, adjust these directory names
          cd flutter_child_app && flutter pub get && cd ..
          cd flutter_parent_app && flutter pub get && cd ..
          
      - name: Build APKs
        run: |
          cd flutter_child_app && flutter build apk --release && cd ..
          cd flutter_parent_app && flutter build apk --release && cd ..
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: |
            flutter_child_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_parent_app/build/app/outputs/flutter-apk/app-release.apk
